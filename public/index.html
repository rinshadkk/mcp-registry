<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Registry</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --orange: #d29922; --red: #f85149;
      --mono: 'SFMono-Regular', Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .logo span { color: var(--accent); }
    .badge { font-size: 11px; background: rgba(88,166,255,.15); color: var(--accent); border-radius: 10px; padding: 2px 8px; }
    .search-wrap { flex: 1; max-width: 400px; position: relative; }
    #search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 12px 7px 32px; }
    #search:focus { outline: none; border-color: var(--accent); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .stats { font-size: 12px; color: var(--muted); margin-left: auto; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn { font-size: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; color: var(--muted); padding: 4px 12px; cursor: pointer; transition: all .15s; }
    .filter-btn:hover, .filter-btn.active { background: rgba(88,166,255,.1); border-color: var(--accent); color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; }
    .card:hover { border-color: #484f58; }
    .card-head { display: flex; align-items: flex-start; gap: 10px; }
    .card-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(88,166,255,.1); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .card-category { font-size: 11px; color: var(--muted); margin-top: 1px; text-transform: capitalize; }
    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; flex: 1; }
    .caps { display: flex; flex-wrap: wrap; gap: 4px; }
    .cap { font-family: var(--mono); font-size: 10px; background: rgba(63,185,80,.08); color: var(--green); border-radius: 4px; padding: 2px 6px; }
    .install-row { display: flex; align-items: center; gap: 8px; }
    .install-type { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .install-type.npx { background: rgba(209,154,102,.1); color: #d19a66; }
    .install-type.uvx { background: rgba(97,175,239,.1); color: #61afef; }
    .install-type.pip { background: rgba(198,120,221,.1); color: #c678dd; }
    .install-pkg { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .verified { font-size: 10px; color: var(--green); display: flex; align-items: center; gap: 3px; }
    .env-count { font-size: 10px; color: var(--muted); }
    .env-count.required { color: var(--orange); }
    a.source-link { font-size: 11px; color: var(--accent); text-decoration: none; }
    a.source-link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px 0; color: var(--muted); }
    .api-section { margin-top: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
    .api-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .api-endpoint { font-family: var(--mono); font-size: 12px; background: var(--bg); border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .method { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
    .method.get { background: rgba(63,185,80,.15); color: var(--green); }
    .api-url { color: var(--accent); }
    .api-desc { font-size: 11px; color: var(--muted); margin-left: auto; font-family: sans-serif; }

    /* Category icon mapping */
    [data-cat="search"] .card-icon::after { content: "🔍"; }
    [data-cat="web"] .card-icon::after { content: "🌐"; }
    [data-cat="development"] .card-icon::after { content: "⚙️"; }
    [data-cat="location"] .card-icon::after { content: "📍"; }
    [data-cat="memory"] .card-icon::after { content: "🧠"; }
    [data-cat="database"] .card-icon::after { content: "🗄️"; }
    [data-cat="browser"] .card-icon::after { content: "🖥️"; }
    [data-cat="reasoning"] .card-icon::after { content: "💭"; }
    [data-cat="communication"] .card-icon::after { content: "💬"; }
    [data-cat="utilities"] .card-icon::after { content: "🛠️"; }
    [data-cat="weather"] .card-icon::after { content: "🌤️"; }
    [data-cat="testing"] .card-icon::after { content: "🧪"; }
  </style>
</head>
<body>
  <header>
    <div class="logo">MCP <span>Registry</span></div>
    <div class="badge" id="count-badge">— servers</div>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search by name, capability, or tag…">
    </div>
    <div class="stats" id="result-stats"></div>
  </header>

  <main>
    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>

    <div class="api-section">
      <div class="api-title">API Endpoints</div>
      <div class="api-endpoint">
        <span class="method get">GET</span>
        <span class="api-url">/catalog.json</span>
        <span class="api-desc">Full catalog — use this in skill-loader-agent</span>
      </div>
      <div class="api-endpoint">
        <span class="method get">GET</span>
        <span class="api-url">/catalog.json#search={query}</span>
        <span class="api-desc">Fetch + filter client-side</span>
      </div>
    </div>
  </main>

  <script>
    let catalog = [];
    let activeCategory = 'all';

    async function init() {
      const r = await fetch('/catalog.json');
      const d = await r.json();
      catalog = d.servers || [];
      document.getElementById('count-badge').textContent = `${catalog.length} servers`;
      buildFilters();
      render(catalog);
    }

    function buildFilters() {
      const cats = ['all', ...new Set(catalog.map(s => s.category))].sort((a, b) => a === 'all' ? -1 : a.localeCompare(b));
      const el = document.getElementById('filters');
      el.innerHTML = cats.map(c => `<button class="filter-btn${c === 'all' ? ' active' : ''}" onclick="setCategory('${c}')">${c === 'all' ? '✦ All' : capitalize(c)}</button>`).join('');
    }

    function setCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(cat === 'all' ? '✦' : cat)));
      doSearch();
    }

    document.getElementById('search').addEventListener('input', doSearch);

    function doSearch() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      let results = catalog;
      if (activeCategory !== 'all') results = results.filter(s => s.category === activeCategory);
      if (q) results = results.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.description.toLowerCase().includes(q) ||
        (s.tags || []).some(t => t.includes(q)) ||
        (s.capabilities || []).some(c => c.includes(q)) ||
        s.install.package.toLowerCase().includes(q)
      );
      render(results);
    }

    function render(servers) {
      const grid = document.getElementById('grid');
      const stats = document.getElementById('result-stats');
      stats.textContent = servers.length === catalog.length ? '' : `${servers.length} of ${catalog.length}`;
      if (!servers.length) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No servers match your search.</div>';
        return;
      }
      grid.innerHTML = servers.map(s => {
        const envReq = (s.install.env_required || []).length;
        const caps = s.capabilities.map(c => `<span class="cap">${c}</span>`).join('');
        const typeClass = s.install.type;
        const pkg = s.install.package;
        return `<div class="card" data-cat="${s.category}">
          <div class="card-head">
            <div class="card-icon"></div>
            <div>
              <div class="card-title">${esc(s.name)}</div>
              <div class="card-category">${esc(s.category)}</div>
            </div>
          </div>
          <div class="card-desc">${esc(s.description)}</div>
          <div class="caps">${caps}</div>
          <div class="install-row">
            <span class="install-type ${typeClass}">${typeClass}</span>
            <span class="install-pkg" title="${esc(pkg)}">${esc(pkg)}</span>
          </div>
          <div class="card-footer">
            ${s.verified ? '<span class="verified">✓ verified</span>' : '<span></span>'}
            <span class="env-count${envReq ? ' required' : ''}">${envReq ? `${envReq} env key${envReq > 1 ? 's' : ''} required` : 'no env required'}</span>
            <a class="source-link" href="${s.source_url}" target="_blank" rel="noopener">source ↗</a>
          </div>
        </div>`;
      }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    init();
  </script>
</body>
</html>
