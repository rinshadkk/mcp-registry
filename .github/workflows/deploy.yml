name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate catalog.json
        run: |
          node -e "
            const c = require('./public/catalog.json');
            const ids = c.servers.map(s => s.id);
            const dupes = ids.filter((id, i) => ids.indexOf(id) !== i);
            if (dupes.length) { console.error('Duplicate IDs:', dupes); process.exit(1); }
            console.log('catalog.json OK —', c.servers.length, 'servers');
          "

      - name: Deploy to Firebase Hosting (preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: biome-registry
          channelId: pr-${{ github.event.number }}

      - name: Deploy to Firebase Hosting (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: biome-registry
          channelId: live
